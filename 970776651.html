<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>测试群常用工具</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef5ff 0%, #ffffff 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, 'Noto Sans', sans-serif;
            color: #1A2C3E;
            line-height: 1.4;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 顶部装饰 (轻盈云状/圆形) */
        .bg-decor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-decor .circle {
            position: absolute;
            background: rgba(33, 150, 243, 0.05);
            border-radius: 50%;
            z-index: 0;
        }
        .circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -80px;
        }
        .circle-2 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            left: -200px;
            background: rgba(0, 119, 255, 0.03);
        }
        .circle-3 {
            width: 200px;
            height: 200px;
            top: 40%;
            left: 70%;
            background: rgba(66, 153, 225, 0.04);
        }

        /* header 区 */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0B5E9E, #1E88E5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }
        .header .sub {
            font-size: 1rem;
            color: #4A627A;
            background: rgba(30, 136, 229, 0.08);
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            font-weight: 500;
        }

        /* 主卡片 (ZArchiver) */
        .primary-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 68, 128, 0.2), 0 2px 5px rgba(0,0,0,0.02);
			padding: 1.2rem 2rem 1.2rem 2rem;  /* 上下内边距从 2rem 减小到 1.2rem */
			margin-bottom: 1.5rem;  /* 减小底部间距 */
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(30, 136, 229, 0.2);
        }
        .primary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 55px -12px rgba(18, 102, 169, 0.25);
            border-color: rgba(30, 136, 229, 0.4);
        }

        .app-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2rem;
        }
        .app-icon {
            flex-shrink: 0;
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #EFF7FF, #D9EBFF);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 18px -8px rgba(0, 100, 210, 0.2);
            transition: all 0.2s;
        }
        .app-icon i {
            font-size: 4.3rem;
            color: #1E88E5;
            filter: drop-shadow(0 4px 6px rgba(0,102,204,0.15));
        }
        .app-info {
            flex: 1;
            min-width: 200px;
        }
        .app-name {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(125deg, #0B5E9E, #0A7AC5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #E8F2FD;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #0D6EFD;
            margin-bottom: 0.75rem;
        }
        .app-badge i {
            font-size: 0.7rem;
        }
        .description {
            font-size: 1rem;
            color: #2C3E50;
            margin: 0.75rem 0 1rem 0;
            line-height: 1.5;
			text-align: left;  /* ← 添加这一行 */
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0 1.5rem;
        }
        .feature-item {
            background: #F4F9FF;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #136B9E;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .feature-item i {
            font-size: 0.75rem;
            color: #1E88E5;
        }
        .download-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .btn-download {
            background: linear-gradient(95deg, #1A73E8, #0D5BBF);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 48px;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 18px rgba(13, 91, 191, 0.25);
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .btn-download i {
            font-size: 1.2rem;
        }
        .btn-download:hover {
            background: linear-gradient(95deg, #0D62D0, #074A9E);
            transform: scale(1.02);
            box-shadow: 0 14px 26px rgba(13, 91, 191, 0.35);
        }
        .btn-download:active {
            transform: scale(0.98);
        }
        .meta-info {
            font-size: 0.75rem;
            color: #5F7F9E;
            background: #F0F6FE;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .meta-info span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* 即将推出区域 */
        .coming-soon-section {
            margin-top: 1rem;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1F6392;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i {
            font-size: 1.6rem;
            color: #4791db;
        }
        .title-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #7FB5E8, transparent);
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
        }
        .app-card-soon {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 1.6rem;
            padding: 1.5rem 1.2rem;
            transition: all 0.25s;
            border: 1px solid rgba(110, 170, 230, 0.3);
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .app-card-soon:hover {
            transform: translateY(-5px);
            background: white;
            border-color: #9ac5f0;
            box-shadow: 0 18px 28px -12px rgba(0, 85, 150, 0.15);
        }
        .soon-icon {
            width: 70px;
            height: 70px;
            background: #EAF3FF;
            margin: 0 auto 1rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #5199db;
        }
        .soon-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2C5368;
            margin-bottom: 0.3rem;
        }
        .soon-desc {
            font-size: 0.8rem;
            color: #67829c;
            margin: 0.5rem 0 1rem;
        }
        .btn-disabled {
            background: #E9F0F6;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.8rem;
            color: #7f95af;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: default;
            width: fit-content;
            margin: 0 auto;
        }
        .badge-coming {
            background: #dbecff;
            color: #146ebe;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 0.8rem;
        }

        /* footer */
        .footer {
            margin-top: 4rem;
            text-align: center;
            color: #7A93AE;
            font-size: 0.75rem;
            border-top: 1px solid rgba(90, 150, 210, 0.2);
            padding-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .footer-links {
            display: flex;
            gap: 1.5rem;
        }
        .footer-links a {
            text-decoration: none;
            color: #5487b4;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: #1E88E5;
        }

        /* 响应式 */
        @media (max-width: 680px) {
            body {
                padding: 1.2rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .primary-card {
                padding: 1.5rem;
            }
            .app-wrapper {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            .app-info {
                text-align: center;
            }
            .description {
                margin-left: auto;
                margin-right: auto;
            }
            .features {
                justify-content: center;
            }
            .download-area {
                justify-content: center;
            }
            .app-name {
                font-size: 1.8rem;
            }
            .app-icon {
                width: 100px;
                height: 100px;
            }
            .app-icon i {
                font-size: 3.5rem;
            }
            .section-title {
                font-size: 1.4rem;
            }
            .footer {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .btn-download {
                padding: 0.7rem 1.5rem;
                font-size: 1rem;
            }
            .meta-info {
                font-size: 0.7rem;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* 滚动条整洁 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #E9F0F8;
        }
        ::-webkit-scrollbar-thumb {
            background: #8EB9E5;
            border-radius: 6px;
        }
    </style>
</head>
